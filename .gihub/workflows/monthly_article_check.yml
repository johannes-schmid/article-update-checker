name: Monthly Article Update Check

on:
  schedule:
    # Runs at 08:00 on the 1st of every month (UTC time)
    - cron: '0 8 1 * *'
  workflow_dispatch: # Optional: allows you to trigger it manually

jobs:
  check-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run article update checker
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python article_update_checker.py